<script>

  // buscar tims do banco 

  function listatimes() {
        const selecttime = document.getElementById("time_input");

        fetch("/times/listar", {
            method: "GET"
        }).then(function (resposta) {
            console.log("Estou no then do listar times...");

            if (resposta.ok) {
                resposta.json().then(function (times) {
                    for (let i = 0; i < times.length; i++) {
                        let option = document.createElement("option");

                        option.value = times[i].id_time;
                        option.textContent = times[i].nome_time + " (" + times[i].id_time + ")";

                        selecttime.appendChild(option);
                    }
                });
            } else {
                console.log("Erro ao buscar times ");
            }
        }).catch(function (erro) {
            console.log("Erro na requisição:", erro);
        });
    }
  

  function cadastrar() {
    
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var timeVar = time_input.value;
    console.log("CLIQUEI NO BOTÃO1");


    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == "" ||
      timeVar == ""

    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
    
    }
    console.log("CLIQUEI NO BOTÃO2");

    // Verificando se o código de ativação é de alguma empresa cadastrada
    
    
console.log("VOU ENVIAR PRA API");
    // Enviando o valor da nova input
    fetch("http://localhost:3333/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,  
        emailServer: emailVar,
        senhaServer: senhaVar,
        timeServer: timeVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });
console.log("CLIQUEI NO BOTÃO3");
    return false;
  }

  // Listando empresas cadastradas 

</script>
