<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NFL | quiz</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estilo.css">
    <link rel="icon" href="./assets/icon/OIP (1).jpg">
    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body onload="iniciarQuiz()">
    <div class="header">
        <div class="container">
            <h1 class="titulo">NFL</h1>
            <ul class="navbar">
                <li>
                    <a href="inicial.html">inicial <a>
                </li>

                <li>|</li>
                <li class="agora">
                    <a href="dashboard/dashboard.html">dashboard</a>
                </li>

            </ul>
        </div>
    </div>



    <div class="container">

        <div id="pontuacaoEJogo" class="flex-colunar align-center gap-16">

            

            <!-- PONTUAÇÃO -->
            <div id="pontuacao" class="flex-colunar width-fit-content border-primary padding-16 quiz-box">

                <div id="pontuacaoDuranteJogo" class="flex-colunar padding-8">
                    <span>Acertos: <span id="spanCertas"></span></span>
                    <span>Erros: <span id="spanErradas"></span></span>
                </div>

                <div id="pontuacaoFinalJogo" class="flex-colunar padding-8">
                    <span>
                        Pontuação Final:
                        <span id="spanPontuacaoFinal">***</span>
                    </span>
                    <span id="msgFinal"></span>
                </div>

            </div>

            <div id="quizContainer" class="quiz-container"></div>

            <div class="quiz-actions">

                <button onclick="finalizarQuiz()" class="btn-primary" id="btnFinalizar" style="display: none;">
                    FINALIZAR QUIZ
                </button>

            </div>

            <div id="resultadoQuiz"></div>



        </div>

    </div>

    <footer class="footer">
        <div class="container">
            <p>Projeto Individual - Quiz NFL</p>
        </div>
    </footer>

</body>

</html>


<script>

    const listaDeQuestoes = [

        {
            pergunta: "Quantos jogadores cada time tem em campo no futebol americano?",
            alternativaA: "7",
            alternativaB: "9",
            alternativaC: "11",
            alternativaD: "13",
            alternativaCorreta: "alternativaC"
        },

        {
            pergunta: "Qual é o principal objetivo do jogo?",
            alternativaA: "Chutar ao gol",
            alternativaB: "Fazer touchdown",
            alternativaC: "Fazer cesta",
            alternativaD: "Acertar o adversário",
            alternativaCorreta: "alternativaB"
        },

        {
            pergunta: "Quantos pontos vale um touchdown?",
            alternativaA: "3",
            alternativaB: "6",
            alternativaC: "1",
            alternativaD: "2",
            alternativaCorreta: "alternativaB"
        },

        {
            pergunta: "Qual posição geralmente lança a bola?",
            alternativaA: "Running Back",
            alternativaB: "Wide Receiver",
            alternativaC: "Quarterback",
            alternativaD: "Linebacker",
            alternativaCorreta: "alternativaC"
        },

        {
            pergunta: "Como se chama quando o time é parado na própria end zone?",
            alternativaA: "Touchdown",
            alternativaB: "Field Goal",
            alternativaC: "Safety",
            alternativaD: "Fumble",
            alternativaCorreta: "alternativaC"
        }

    ]

    function iniciarQuiz() {

       document.getElementById("btnFinalizar").style.display = "block"

        const quizContainer = document.getElementById("quizContainer")

        quizContainer.innerHTML = ""

        listaDeQuestoes.forEach((questao, index) => {

            quizContainer.innerHTML += `

        <div class="quiz-card">

            <h3>${index + 1}. ${questao.pergunta}</h3>

            <label class="quiz-alternativa">
                <input type="radio" name="q${index}" value="alternativaA">
                ${questao.alternativaA}
            </label>

            <label class="quiz-alternativa">
                <input type="radio" name="q${index}" value="alternativaB">
                ${questao.alternativaB}
            </label>

            <label class="quiz-alternativa">
                <input type="radio" name="q${index}" value="alternativaC">
                ${questao.alternativaC}
            </label>

            <label class="quiz-alternativa">
                <input type="radio" name="q${index}" value="alternativaD">
                ${questao.alternativaD}
            </label>

        </div>

        `
        })

    }

    function finalizarQuiz() {

        let acertos = 0
        let erros = 0

        listaDeQuestoes.forEach((questao, index) => {

            const resposta = document.querySelector(`input[name="q${index}"]:checked`)

            if (resposta) {

                if (resposta.value == questao.alternativaCorreta) {
                    acertos++
                } else {
                    erros++
                }

            }

        })

        const pontuacao = acertos

        alert(`
Quiz finalizado!

Acertos: ${acertos}
Erros: ${erros}
Pontuação: ${pontuacao}
`)

        fetch("/quiz/salvar", {

            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                acertos: acertos,
                erros: erros,
                pontuacao: pontuacao,
                idUsuario: sessionStorage.ID_USUARIO
            })

        })

    }

</script>
