<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
      <link rel="icon" href="../assets/icon/OIP (1).jpg">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL | Dashboard</title>

    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />

    <script src="../js/sessao.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="janela">
        <div class="header-left">
            <h1>NFL</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario"></span>!</h3>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>
        </div>

        <div class="dash">
            <div id="graficos">

                <div class="graph">
                    <h3>Desempenho dos usuários no Quiz</h3>
                    <canvas id="graficoQuiz"></canvas>
                </div>

                <div class="graph">
                    <h3>Times Favoritos dos usuários</h3>
                    <canvas id="graficoTimes"></canvas>
                </div>

            </div>
        </div>
    </div>

</body>

</html>

<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    window.onload = function () {
        carregarGraficoQuiz();
        carregarGraficoTimes();
    }

    function carregarGraficoQuiz() {
        fetch("/quiz/distribuicao")
            .then(res => res.json())
            .then(dados => {

                const labels = [];
                const valores = [];

                dados.forEach(item => {
                    labels.push(item.pontuacao);
                    valores.push(item.quantidade);
                });

                new Chart(document.getElementById("graficoQuiz"), {
                    type: "line",
                    data: {
                        labels: labels,
                        datasets: [{
                            label: "Quantidade de usuários por pontuação",
                            data: valores,
                            borderColor: "#013369",
                            backgroundColor: "rgba(1, 51, 105, 0.2)",
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: {
                        plugins: {
                            legend: {
                                labels: {
                                    color: "white"
                                }
                            }
                        },
                        scales: {
                            x: {
                                title: {
                                    display: true,
                                    text: "Pontuação",
                                    color: "white"
                                },
                                ticks: { color: "white" }
                            },
                            y: {
                                title: {
                                    display: true,
                                    text: "Quantidade de usuários",
                                    color: "white"
                                },
                                ticks: { color: "white" },
                                beginAtZero: true
                            }
                        }
                    }
                });
            })
            .catch(err => {
                console.error(err);
            });
    }

    function carregarGraficoTimes() {
        fetch("/quiz/times-dados")
            .then(res => res.json())
            .then(dados => {

                console.log("TIMES:", dados);

                if (!dados || dados.length == 0) return;

                const labels = [];
                const valores = [];

                dados.forEach(item => {
                    labels.push(item.nome_time);
                    valores.push(item.quantidade);
                });

                new Chart(document.getElementById("graficoTimes"), {
                    type: "pie",
                    data: {
                        labels: labels,
                        datasets: [{
                            data: valores,
                            backgroundColor: [
                                "#013369", // azul NFL
                                "#d50a0a", // vermelho NFL
                                "#ffffff",
                                "#888888",
                                "#00ffcc",
                                "#ffaa00"
                            ]
                        }]
                    }
                });
            })
            .catch(err => console.error("Erro times:", err));
    }
</script>
